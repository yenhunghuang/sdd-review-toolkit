# SDD Review Toolkit - tmux Keybindings
# Usage: Add to your .tmux.conf:
#   source-file /path/to/tmux/.tmux-sdd.conf
#
# Requires sdd-functions.sh to be sourced in .bashrc/.zshrc
# so that new tmux panes (via bash -ic) inherit the functions.

# prefix + R — sdd-review (right pane, 55%)
bind-key R split-window -h -l 55% -c "#{pane_current_path}" "bash -ic 'sdd-review; exec bash'"

# prefix + S — sdd-specs (right pane, 55%)
bind-key S split-window -h -l 55% -c "#{pane_current_path}" "bash -ic 'sdd-specs; exec bash'"

# prefix + D — sdd-diff (right pane, 55%)
bind-key D split-window -h -l 55% -c "#{pane_current_path}" "bash -ic 'sdd-diff; exec bash'"

# prefix + W — sdd-watch (right pane, 55%, prompts for filename)
bind-key W split-window -h -l 55% -c "#{pane_current_path}" "bash -ic 'read -p \"Watch file: \" f && sdd-watch \"\$f\"'"

# prefix + T — sdd-tree (right pane, 55%)
bind-key T split-window -h -l 55% -c "#{pane_current_path}" "bash -ic 'sdd-tree; exec bash'"

# prefix + E — open VS Code in current directory
bind-key E run-shell "code '#{pane_current_path}'"
